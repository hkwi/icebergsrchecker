<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iceberg Schema Pre-check</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Iceberg Kafka Connect Sink</p>
        <h1>Parquet Dry-run Pre-check</h1>
        <p class="sub">
          Schema Registry の schema を Kafka Connect schema に変換し、Iceberg schema と
          Parquet writer まで dry-run します。
        </p>
      </section>

      <section class="panel">
        <form id="checker-form">
          <div class="controls">
            <label for="format">Format</label>
            <select id="format" name="format">
              <option value="avro">Avro</option>
              <option value="json-schema">JSON Schema</option>
              <option value="protobuf">Protobuf</option>
            </select>
            <label class="check">
              <input type="checkbox" id="schema-force-optional" />
              schema-force-optional
            </label>
            <button type="button" id="example-btn">Load Example</button>
          </div>

          <label for="schema">Schema</label>
          <textarea id="schema" name="schema" spellcheck="false" required></textarea>

          <details>
            <summary>Optional value/config</summary>
            <div class="optional-grid">
              <label for="sample-format">Sample format</label>
              <select id="sample-format">
                <option value="auto">Auto</option>
                <option value="avro-json">Avro JSON</option>
                <option value="json">JSON</option>
                <option value="protobuf-json">Protobuf JSON</option>
                <option value="protobuf-text">Protobuf TextFormat</option>
              </select>

              <label for="sample-value">Sample value</label>
              <textarea id="sample-value" spellcheck="false"></textarea>

              <label for="converter-config">Converter config JSON</label>
              <textarea id="converter-config" spellcheck="false">{}</textarea>
            </div>
          </details>

          <div class="actions">
            <button type="submit" class="primary">Submit</button>
          </div>
        </form>
      </section>

      <section class="panel result">
        <div class="result-header">
          <h2>Result</h2>
          <span id="status-pill" class="pill">Not checked</span>
        </div>
        <p id="summary">まだチェックされていません。</p>
        <pre id="details"></pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
