<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iceberg Schema Pre-check</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Iceberg Kafka Connect Sink</p>
        <h1>Schema Conversion Pre-check</h1>
        <p class="sub">
          Avro / JSON Schema / Protobuf を貼り付け、Confluent + Iceberg ライブラリを使って
          変換可能性を判定します。
        </p>
      </section>

      <section class="panel">
        <form id="checker-form">
          <div class="controls">
            <label for="format">Format</label>
            <select id="format" name="format">
              <option value="avro">Avro</option>
              <option value="json-schema">JSON Schema</option>
              <option value="protobuf">Protobuf</option>
            </select>
            <button type="button" id="example-btn">Load Example</button>
          </div>

          <label for="schema">Schema</label>
          <textarea id="schema" name="schema" spellcheck="false" required></textarea>

          <div class="actions">
            <button type="submit" class="primary">Submit</button>
          </div>
        </form>
      </section>

      <section class="panel result">
        <div class="result-header">
          <h2>Result</h2>
          <span id="status-pill" class="pill">Not checked</span>
        </div>
        <p id="summary">まだチェックされていません。</p>
        <pre id="details"></pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
